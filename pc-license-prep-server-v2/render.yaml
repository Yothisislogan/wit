services:
  - type: web
    name: pc-license-prep-academy-v2
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_BASE_URL
        value: https://your-domain.com
      - key: ENABLE_DEV_LOGIN
        value: false
      - key: SESSION_SECRET
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: deepseek-r1:7b
      - key: OLLAMA_MAX_TOKENS
        value: 700
