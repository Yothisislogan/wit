services:
  - type: web
    name: pc-license-prep-academy
    env: python
    plan: starter
    rootDir: pc-license-prep-server-v1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/pc_prep.db
